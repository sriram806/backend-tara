name: CD Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install AI python dependencies
        run: pip install -r services/ai-service/requirements.txt

      - name: Run tests
        run: |
          pnpm test:node
          pnpm test:python

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service images
        env:
          IMAGE_TAG: ${{ github.sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          docker buildx build --push --platform linux/amd64 -t ghcr.io/$OWNER/thinkai-gateway:$IMAGE_TAG -f services/gateway/Dockerfile .
          docker buildx build --push --platform linux/amd64 -t ghcr.io/$OWNER/thinkai-auth-service:$IMAGE_TAG -f services/auth-service/Dockerfile .
          docker buildx build --push --platform linux/amd64 -t ghcr.io/$OWNER/thinkai-user-service:$IMAGE_TAG -f services/user-service/Dockerfile .
          docker buildx build --push --platform linux/amd64 -t ghcr.io/$OWNER/thinkai-billing-service:$IMAGE_TAG -f services/billing-service/Dockerfile .
          docker buildx build --push --platform linux/amd64 -t ghcr.io/$OWNER/thinkai-notification-service:$IMAGE_TAG -f services/notification-service/Dockerfile .
          docker buildx build --push --platform linux/amd64 -t ghcr.io/$OWNER/thinkai-ai-service:$IMAGE_TAG -f services/ai-service/Dockerfile .
          docker buildx build --push --platform linux/amd64 -t ghcr.io/$OWNER/thinkai-github-service:$IMAGE_TAG -f services/ai-service/Dockerfile .

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            export IMAGE_TAG=${{ github.sha }}
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            cd /opt/thinkai/services
            docker compose -f infra/docker-compose.prod.yml pull
            docker compose -f infra/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

name: think_v1

services:
  postgres:
    image: postgres:16-alpine
    container_name: think_v1_postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: thinkai
      POSTGRES_PASSWORD: thinkai
      POSTGRES_DB: thinkai
    ports:
      - "5432:5432"
    volumes:
      - think_v1_pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thinkai -d thinkai"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: think_v1_pgadmin
    env_file:
      - ../.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@thinkai.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_SESSION_COOKIE_NAME: "'pgadmin_thinkai'"
    ports:
      - "5050:80"
    volumes:
      - ./postgres/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - think_v1_network

  redis:
    image: redis:7-alpine
    container_name: think_v1_redis
    env_file:
      - ../.env
    ports:
      - "6379:6379"
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: think_v1_mongodb
    env_file:
      - ../.env
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-secret}
    volumes:
      - think_v1_mongo_data:/data/db
    networks:
      - think_v1_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: think_v1_gateway
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: think_v1_gateway
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: gateway
      PORT: ${GATEWAY_PORT:-4000}
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${GATEWAY_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-150}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      AI_SERVICE_URL: http://ai-service:8000
      EXAM_SERVICE_URL: http://exam-service:4111
      BILLING_SERVICE_URL: http://billing-service:4010
      NOTIFICATION_SERVICE_URL: http://notification-service:4012
      INTERVIEW_SERVICE_URL: http://interview-service:4013
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-service:
    image: think_v1_auth_service
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: think_v1_auth_service
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: auth-service
      PORT: ${AUTH_SERVICE_PORT:-4001}
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${AUTH_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://thinkai:thinkai@postgres:5432/thinkai?sslmode=disable}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      JWT_REFRESH_SECRET: ${AUTH_REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 30d
      REFRESH_COOKIE_NAME: refreshToken
      BCRYPT_ROUNDS: 12
      OTP_EXPIRY_MINUTES: 5
      OTP_MAX_ATTEMPTS: 5
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES:-720}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  user-service:
    image: think_v1_user_service
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    container_name: think_v1_user_service
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: user-service
      PORT: ${USER_SERVICE_PORT:-4002}
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${USER_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://thinkai:thinkai@postgres:5432/thinkai?sslmode=disable}
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/thinkai?authSource=admin
      REDIS_URL: redis://redis:6379
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES:-720}
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AI_SERVICE_INTERNAL_URL: ${AI_SERVICE_INTERNAL_URL:-http://ai-service:8000}
      AI_MONTHLY_QUOTA_MAX: ${AI_MONTHLY_QUOTA_MAX:-30}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      exam-service:
        condition: service_healthy
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4002/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-service:
    image: think_v1_ai_service
    build:
      context: ..
      dockerfile: services/ai-service/Dockerfile
    container_name: think_v1_ai_service
    env_file:
      - ../.env
    environment:
      SERVICE_NAME: ai-service
      ENVIRONMENT: ${NODE_ENV:-development}
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${AI_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      AI_MOCK_MODE: ${AI_MOCK_MODE:-false}
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/thinkai?authSource=admin
      DATABASE_URL: ${DATABASE_URL:-postgresql://thinkai:thinkai@postgres:5432/thinkai?sslmode=disable}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      GROQ_MODEL: ${GROQ_MODEL}
      GEMINI_MODEL: ${GEMINI_MODEL}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-25}
      CIRCUIT_FAILURE_THRESHOLD: ${CIRCUIT_FAILURE_THRESHOLD:-5}
      CIRCUIT_OPEN_SECONDS: ${CIRCUIT_OPEN_SECONDS:-120}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  exam-service:
    image: think_v1_exam_service
    build:
      context: ..
      dockerfile: services/exam-service/Dockerfile
    container_name: think_v1_exam_service
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: exam-service
      PORT: ${EXAM_SERVICE_PORT:-4111}
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${EXAM_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://thinkai:thinkai@postgres:5432/thinkai?sslmode=disable}
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "4111:4111"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4111/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  billing-service:
    image: think_v1_billing_service
    build:
      context: ..
      dockerfile: services/billing-service/Dockerfile
    container_name: think_v1_billing_service
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: billing-service
      PORT: ${BILLING_SERVICE_PORT:-4010}
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${BILLING_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://thinkai:thinkai@postgres:5432/thinkai?sslmode=disable}
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/thinkai?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_SfhDGY5BOlgV6S}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-FcrLDj84W7SrvLhEU4W6LPMv}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-rzp_test_webhook}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "4010:4010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-service:
    image: think_v1_notification_service
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    container_name: think_v1_notification_service
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: notification-service
      PORT: ${NOTIFICATION_SERVICE_PORT:-4012}
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${NOTIFICATION_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://thinkai:thinkai@postgres:5432/thinkai?sslmode=disable}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@thinkai.dev}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "4012:4012"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4012/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  interview-service:
    image: think_v1_interview_service
    build:
      context: ..
      dockerfile: services/interview-service/Dockerfile
    container_name: think_v1_interview_service
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: interview-service
      PORT: ${INTERVIEW_SERVICE_PORT:-4013}
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${INTERVIEW_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/thinkai?authSource=admin
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "4013:4013"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - think_v1_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4013/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  think_v1_network:
    driver: bridge

volumes:
  think_v1_pg_data:
  think_v1_mongo_data:


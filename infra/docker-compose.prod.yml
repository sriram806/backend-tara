name: think_v1

services:
  redis:
    image: redis:7-alpine
    env_file:
      - ../.env
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - think_v1_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - think_v1_mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 15s
      timeout: 5s
      retries: 5

  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/think_v1_gateway:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      SERVICE_NAME: gateway
      PORT: 4000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${GATEWAY_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-150}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      AI_SERVICE_URL: http://ai-service:8000
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  auth-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/think_v1_auth_service:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      SERVICE_NAME: auth-service
      PORT: 4001
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${AUTH_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      JWT_REFRESH_SECRET: ${AUTH_REFRESH_TOKEN_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/think_v1_user_service:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      SERVICE_NAME: user-service
      PORT: 4002
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${USER_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL}
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/thinkai?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AI_SERVICE_INTERNAL_URL: http://ai-service:8000
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/think_v1_billing_service:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      SERVICE_NAME: billing-service
      PORT: 4010
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${BILLING_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL}
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/thinkai?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4002/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/think_v1_notification_service:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      SERVICE_NAME: notification-service
      PORT: 4012
      HOST: 0.0.0.0
      LOG_LEVEL: info
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${NOTIFICATION_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4012/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/think_v1_ai_service:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SERVICE_NAME: ai-service
      ENVIRONMENT: production
      METRICS_NAMESPACE: ${METRICS_NAMESPACE:-ThinkAI/Services}
      SENTRY_DSN: ${AI_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017/thinkai?authSource=admin
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      GEMINI_MODEL: ${GEMINI_MODEL}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  think_v1_redis_data:
  think_v1_mongo_data:
